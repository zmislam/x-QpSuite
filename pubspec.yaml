name: qp_suite
description: "QP Suite — Business management app for QP Pages. Manage content, inbox, insights, ads & more."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State & Navigation
  provider: ^6.1.2
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  socket_io_client: ^3.0.2

  # Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.5.4

  # Firebase
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.4

  # UI
  cached_network_image: ^3.4.1
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.17
  cupertino_icons: ^1.0.8

  # Media
  image_picker: ^1.1.2
  file_picker: ^8.1.7
  video_player: ^2.9.2
  photo_view: ^0.15.0

  # Utils
  intl: ^0.20.2
  uuid: ^4.5.1
  url_launcher: ^6.3.1
  package_info_plus: ^8.3.0
  connectivity_plus: ^6.1.4
  permission_handler: ^11.4.0
  share_plus: ^10.1.4
  path_provider: ^2.1.5
  table_calendar: ^3.2.0
  timeago: ^3.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
